name: Deploy Portfolio Website

on:
  push:
    branches:
      - main
      - dev

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22


      - name: Install Dependencies
        run: npm install

      - name: Build Astro
        run: npm run build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          role-to-assume: arn:aws:iam::474013238625:role/GitHubAction_Deploy_StaticSite
          aws-region: ap-southeast-1

      - name: Deploy to AWS
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "Deploying to Production..."
            aws s3 sync dist/ s3://truongtudev.id.vn --delete
            aws cloudfront create-invalidation --distribution-id E2PPFBHKMRL9JE --paths "/*"
          elif [ "${{ github.ref }}" == "refs/heads/dev" ]; then
            echo "Deploying to Staging (Dev branch)..."
            # aws s3 sync dist/ s3://dev.truongtudev.id.vn --delete 
          fi


