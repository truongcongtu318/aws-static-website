name: Deploy Portfolio Website

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          role-to-assume: arn:aws:iam::474013238625:role/GitHubAction_Deploy_StaticSite
          aws-region: ap-southeast-1

      - name: Deploy to S3
        run: |
          aws s3 sync . s3://truongtudev.id.vn --delete --exclude ".git*" --exclude ".github*"

      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation --distribution-id E2PPFBHKMRL9JE --paths "/*"
